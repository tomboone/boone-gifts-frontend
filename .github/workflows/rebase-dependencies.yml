name: Rebase dependency branch

on:
  schedule:
    - cron: "0 12 * * 6" # 7am EST / 8am EDT — always ≥1hr before Dependabot at 9am ET

permissions:
  contents: write

jobs:
  rebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebase updates/dependencies from main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout updates/dependencies || git checkout -b updates/dependencies
          git rebase origin/main
          git push --force-with-lease origin updates/dependencies
